<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ else }}{{ $.Site.Title }}{{ end }}{{ end }}" />
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <link rel="preload" href="/assets/fonts/hack/hack-regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" />
    <link rel="stylesheet" href="/css/Main.min.css" />
</head>
<body class="blog">
    <div class="blog-page">
        <header class="header">
            <div class="header__left">
                <a class="header__home" href="/" aria-label="Back to landing page">
                    <svg aria-hidden="true" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 3.172 2.586 12.586a2 2 0 0 0 2.828 2.828L6 14.828V21a1 1 0 0 0 1 1h3v-6h4v6h3a1 1 0 0 0 1-1v-6.172l.586.586a2 2 0 0 0 2.828-2.828z"/></svg>
                </a>
            </div>
            <nav class="header__nav" aria-label="Site links">
                <input class="theme-toggle__input" type="checkbox" id="theme-toggle" aria-label="Toggle dark mode" />
                <label class="theme-toggle" for="theme-toggle" aria-label="Toggle dark mode">
                    <svg class="theme-toggle__icon theme-toggle__icon--regular" aria-hidden="true" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2a7 7 0 0 0-4.9 12A5 5 0 0 1 8.5 17v1a1 1 0 0 0 1 1h5a1 1 0 0 0 1-1v-1a5 5 0 0 1 1.4-3A7 7 0 0 0 12 2m2.5 16v.5a2.5 2.5 0 0 1-5 0V18zM12 4a5 5 0 0 1 3.5 8.55A7 7 0 0 0 13.72 15h-3.44a7 7 0 0 0-1.78-2.45A5 5 0 0 1 12 4"/></svg>
                    <svg class="theme-toggle__icon theme-toggle__icon--solid" aria-hidden="true" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2a7 7 0 0 0-4.9 12A5 5 0 0 1 8.5 17v1a1 1 0 0 0 1 1h5a1 1 0 0 0 1-1v-1a5 5 0 0 1 1.4-3A7 7 0 0 0 12 2"/><path d="M9.5 20a2.5 2.5 0 0 0 5 0V20z"/></svg>
                </label>
            </nav>
        </header>

        <div class="blog-layout">
            <aside class="sidebar navigation-panel" aria-label="Post tree navigation">
                {{ partial "docs-nav.html" . }}
            </aside>

            <main class="content">
                <div class="content__surface">
                    {{ block "main" . }}{{ end }}
                </div>
            </main>

            <aside class="sidebar toc-panel" aria-label="In-page table of contents">
                {{ partial "docs-toc.html" . }}
            </aside>
        </div>

        <div class="blog-footer" role="contentinfo">
            <p>© 2026 Valentin Horacek. Content licensed under CC BY-NC 4.0.</p>
        </div>
    </div>
</body>
</html>
